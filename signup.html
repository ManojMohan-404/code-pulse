<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Pulse - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>
    <!-- Particles.js Background -->
    <div id="particles-js"></div>

 <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Code Pulse</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#courses">Courses</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="support.html">Support</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="signup.html">Sign Up</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Sign Up Section -->
    <div class="signup-section">
        <div class="container">
            <div class="row align-items-center">
                <!-- Illustration -->
                <div class="col-md-6 d-none d-md-block">
                    <div class="illustration">
                        <img src="media/signup.jpg" alt="Learning Illustration">
                    </div>
                </div>
                <!-- Sign Up Form -->
                <div class="col-md-6">
                    <div class="signup-form">
                        <h2 class="text-center mb-4">Sign Up with Email</h2>
                        <form>
                            <div class="mb-3">
                                <input type="text" class="form-control" id="fullName" placeholder="Full Name" required>
                            </div>
                            <div class="mb-3">
                                <input type="email" class="form-control" id="email" placeholder="Gmail Address" required>
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control" id="password" placeholder="Password" required>
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control" id="reenterPassword" placeholder="Re-enter Password" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="offers">
                                <label class="form-check-label text-light" for="offers">Send me special offers, personalized recommendations, and learning tips.</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Continue with Email</button>
                        </form>
                        <p class="text-center text-light mt-3">
                            Already have an account? <a href="login.html" class="text-light">Login</a>
                        </p>
                        <div class="social-signup text-center mt-3">
                            <p class="text-light">Other sign up options</p>
                            <div class="d-flex justify-content-center gap-2">
                                <button class="btn btn-outline-light"><i class="fab fa-google"></i></button>
                                <button class="btn btn-outline-light"><i class="fab fa-facebook-f"></i></button>
                                <button class="btn btn-outline-light"><i class="fab fa-apple"></i></button>
                            </div>
                        </div>
                        <p class="text-center text-light mt-3 small">
                            By signing up, you agree to our <a href="#" class="text-light">Terms of Use</a> and <a href="#" class="text-light">Privacy Policy</a>.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
        <p>© 2025 Code Pulse. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="signup-scripts.js"></script>
    <!-- Font Awesome for social icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script id="particles-js" src="js/background.js"></script>
    <script src="models/User.js"></script>
    <script src="controllers/authController.js"></script>
    <script src="routes/authRoutes.js"></script>
    <script src="app.js"></script>
    <script src="js/signup.js"></script>
    
</body>
</html>
